<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LowLight Detector - Визуализация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .img-card { max-height: 300px; object-fit: contain; }
        .card { margin-bottom: 20px; }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container mt-4">
        <h1 class="mb-4">Детекция объектов при слабом освещении</h1>
        
        <!-- Форма загрузки и параметров -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h5 class="card-title">Загрузить изображение</h5>
                        <input type="file" id="imageUpload" accept="image/*" class="form-control mb-2">
                        <button id="analyzeBtn" class="btn btn-primary w-100">Анализировать</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-secondary">
                    <div class="card-body">
                        <h5 class="card-title">Параметры</h5>
                        <label>Модель детекции:</label>
                        <select id="detectorSelect" class="form-select mb-2">
                            <option value="yolov8n">YOLOv8 Nano</option>
                            <option value="yolov8m" selected>YOLOv8 Medium</option>
                            <option value="faster_rcnn">Faster R-CNN</option>
                        </select>
                        <label>Порог уверенности:</label>
                        <input type="range" id="confThreshold" min="0.1" max="0.9" step="0.05" value="0.25" class="form-range">
                        <span id="confValue">0.25</span>
                        <hr>
                        <label>Методы улучшения:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="clahe" id="chkClahe" checked>
                            <label class="form-check-label" for="chkClahe">CLAHE</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="gamma" id="chkGamma" checked>
                            <label class="form-check-label" for="chkGamma">Gamma Correction</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="msrcr" id="chkMsrcr">
                            <label class="form-check-label" for="chkMsrcr">MSRCR (Multi-Scale Retinex)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="bilateral" id="chkBilateral">
                            <label class="form-check-label" for="chkBilateral">Bilateral Filter</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="zero_dce" id="chkZeroDce">
                            <label class="form-check-label" for="chkZeroDce">Zero-DCE (Deep Curve Estimation)</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        

        <div id="resultsContainer" class="row"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
