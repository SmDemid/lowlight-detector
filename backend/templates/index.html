<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LowLight Detector – Визуализация</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Пользовательские стили -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-4">
        <!-- Заголовок -->
        <div class="d-flex align-items-center mb-4">
            <h1 class="me-3">Детекция объектов при слабом освещении</h1>
            <span class="badge bg-info text-dark">v1.0</span>
        </div>

        <!-- Панель управления -->
        <div class="row g-3 mb-4">
            <!-- Загрузка изображений -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header">
                        <h5 class="mb-0">Загрузить изображения</h5>
                    </div>
                    <div class="card-body">
                        <input type="file" id="imageUpload" accept="image/*" multiple class="form-control mb-3">
                        <div class="d-grid gap-2">
                            <button id="analyzeSingleBtn" class="btn btn-primary">
                                <span class="me-1">[1]</span> Анализировать одно изображение
                            </button>
                            <button id="analyzeBatchBtn" class="btn btn-success">
                                <span class="me-1">[N]</span> Анализировать пакет
                            </button>
                        </div>
                        <hr>
                        <div id="fileList" class="small text-muted-custom"></div>
                    </div>
                </div>
            </div>

            <!-- Параметры -->
            <div class="col-lg-6">
                <div class="card h-100">
                    <div class="card-header">
                        <h5 class="mb-0">Параметры обработки</h5>
                    </div>
                    <div class="card-body">
                        <label class="form-label">Модель детекции:</label>
                        <select id="detectorSelect" class="form-select mb-3">
                            <option value="yolov8n">YOLOv8 Nano (быстрее)</option>
                            <option value="yolov8m" selected>YOLOv8 Medium (сбалансированная)</option>
                            <option value="faster_rcnn">Faster R-CNN (точнее)</option>
                        </select>

                        <label class="form-label">Порог уверенности: <span id="confValue">0.25</span></label>
                        <input type="range" id="confThreshold" min="0.1" max="0.9" step="0.05" value="0.25" class="form-range mb-3">

                        <label class="form-label">Методы улучшения:</label>
                        <div class="row">
                            <div class="col-sm-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="clahe" id="chkClahe" checked>
                                    <label class="form-check-label" for="chkClahe">CLAHE</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="gamma" id="chkGamma" checked>
                                    <label class="form-check-label" for="chkGamma">Gamma Correction</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="msrcr" id="chkMsrcr">
                                    <label class="form-check-label" for="chkMsrcr">MSRCR</label>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="bilateral" id="chkBilateral">
                                    <label class="form-check-label" for="chkBilateral">Bilateral Filter</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="zero_dce" id="chkZeroDce">
                                    <label class="form-check-label" for="chkZeroDce">Zero-DCE</label>
                                </div>
                            </div>
                        </div>
                        <small class="text-muted-custom">Выберите один или несколько методов для сравнения.</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Индикатор загрузки -->
        <div id="loadingPanel" class="alert alert-secondary d-none" role="status">
            <div class="d-flex align-items-center">
                <div class="spinner-border text-primary me-3" role="status"></div>
                <span id="loadingMessage">Обработка изображения...</span>
            </div>
            <div class="progress mt-2">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
            </div>
        </div>

        <!-- Результаты -->
        <div id="resultsContainer" class="row g-3"></div>
    </div>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
